<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadBuddy 📚</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap');
  :root {
    --blue:#4361EE; --green:#06D6A0; --red:#EF476F;
    --yellow:#FFD166; --purple:#9B5DE5;
    --text:#1a1a2e; --muted:#6b7280;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#c9e8ff,#e8f5ff 50%,#d4f0e8);min-height:100vh;color:var(--text);}
  header{text-align:center;padding:22px 16px 8px;}
  .logo{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,5vw,2.6rem);color:var(--blue);display:inline-flex;align-items:center;gap:10px;}
  .logo span{display:inline-block;animation:bb 2.5s ease-in-out infinite;}
  @keyframes bb{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg) scale(1.1)}}
  .tag{font-size:.88rem;color:var(--muted);font-weight:700;margin-top:3px;}
  .app{max-width:720px;margin:0 auto;padding:0 14px 60px;}

  .warn{background:#fff3cd;border:2px solid #ffc107;border-radius:12px;padding:10px 14px;margin-bottom:10px;font-size:.84rem;font-weight:700;color:#856404;display:none;}
  .warn.show{display:block;}

  .card{background:#fff;border-radius:22px;padding:28px 22px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.07);}

  /* Upload */
  .upload-zone{border:3px dashed #b5d5f5;border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:#f0f6ff;}
  .upload-zone .icon{font-size:3rem;margin-bottom:10px;}
  .upload-zone p{font-weight:700;color:var(--blue);font-size:1.05rem;}
  .upload-zone small{color:var(--muted);font-size:.82rem;}
  #fileInput{display:none;}

  /* Progress bar */
  .scan-bar{height:8px;background:#e0e8ff;border-radius:99px;margin-top:14px;overflow:hidden;display:none;}
  .scan-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:99px;width:0;transition:width .3s;}

  /* Text display */
  #textDisplay{font-size:clamp(1.2rem,3.5vw,1.6rem);line-height:2.2;letter-spacing:.01em;min-height:120px;}
  .word{
    display:inline-block;
    padding:2px 5px;
    border-radius:6px;
    cursor:default;
    transition:all .2s;
    margin:2px 1px;
  }
  .word.done{color:#aaa;text-decoration:line-through;}
  .word.current{
    background:var(--yellow);
    color:var(--text);
    font-weight:900;
    box-shadow:0 3px 12px rgba(255,209,102,.5);
    transform:scale(1.08);
  }
  .word.current.hinting{
    background:#ffb3c1;
    animation:pulse .6s ease-in-out infinite alternate;
  }
  @keyframes pulse{from{transform:scale(1.05)}to{transform:scale(1.12)}}

  /* Controls */
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
  .btn{
    flex:1;min-width:130px;
    padding:14px 18px;
    border:none;border-radius:14px;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;
    cursor:pointer;transition:all .15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(67,97,238,.35);}
  .btn-primary:hover{background:#3451d1;}
  .btn-primary:disabled{background:#c0caff;box-shadow:none;cursor:not-allowed;}
  .btn-danger{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(239,71,111,.3);}
  .btn-danger:hover{background:#d63557;}
  .btn-neutral{background:#f1f3f9;color:var(--text);}
  .btn-neutral:hover{background:#e2e6f3;}

  /* Hint box */
  .hint-box{
    background:linear-gradient(135deg,#fff7e6,#fff0fa);
    border:2px solid #ffd6a5;
    border-radius:18px;
    padding:18px 22px;
    margin-top:14px;
    display:none;
    animation:slideIn .3s ease;
  }
  .hint-box.show{display:block;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .hint-label{font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--purple);margin-bottom:6px;}
  .hint-text{font-size:1.3rem;font-weight:800;color:var(--text);}
  .hint-steps{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .hint-step{
    padding:6px 14px;border-radius:20px;font-weight:700;font-size:.88rem;
    background:#e8edff;color:var(--blue);cursor:pointer;transition:all .15s;border:2px solid transparent;
  }
  .hint-step.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .hint-step:hover{border-color:var(--blue);}

  /* Stats */
  .stats{display:flex;gap:12px;flex-wrap:wrap;}
  .stat{flex:1;min-width:90px;background:#f8f9ff;border-radius:14px;padding:12px 10px;text-align:center;}
  .stat-val{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--blue);}
  .stat-lbl{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}

  /* Listening indicator */
  .listening-badge{
    display:none;align-items:center;gap:8px;
    background:#e8fff4;border:2px solid var(--green);
    border-radius:12px;padding:8px 14px;
    font-weight:700;color:#059669;font-size:.88rem;margin-top:10px;
  }
  .listening-badge.show{display:flex;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--green);animation:blink 1s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

  /* Heard display */
  .heard{margin-top:8px;font-size:.82rem;color:var(--muted);font-weight:600;min-height:1.4em;}

  /* Celebration */
  .celebration{
    position:fixed;inset:0;background:rgba(0,0,0,.55);
    display:none;align-items:center;justify-content:center;z-index:100;
  }
  .celebration.show{display:flex;}
  .celeb-inner{
    background:#fff;border-radius:28px;padding:44px 36px;text-align:center;
    max-width:360px;animation:pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .celeb-emoji{font-size:4rem;margin-bottom:10px;}
  .celeb-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--blue);margin-bottom:6px;}
  .celeb-sub{color:var(--muted);font-weight:700;margin-bottom:20px;}

  /* Debug */
  .debug-toggle{font-size:.78rem;color:var(--muted);cursor:pointer;text-decoration:underline;margin-top:6px;display:inline-block;}
  #debugPanel{display:none;background:#1a1a2e;color:#a0e4b0;font-family:monospace;font-size:.78rem;border-radius:10px;padding:10px;margin-top:8px;max-height:120px;overflow-y:auto;}
  #debugPanel.show{display:block;}
  #debugPanel p{margin:1px 0;}
  #debugPanel p.ok{color:#6ee7b7;}
  #debugPanel p.miss{color:#fca5a5;}
  #debugPanel p.hint{color:#fde68a;}
</style>
</head>
<body>

<header>
  <div class="logo"><span>📚</span> ReadBuddy</div>
  <div class="tag">Your reading sidekick!</div>
</header>

<div class="app">

  <div class="warn" id="httpsWarn">
    ⚠️ Microphone requires HTTPS. Open via GitHub Pages or localhost — not by double-clicking the file.
  </div>

  <!-- Upload -->
  <div class="card" id="uploadCard">
    <div class="upload-zone" id="uploadZone">
      <div class="icon">📖</div>
      <p>Drop your book PDF here</p>
      <small>or click to browse</small>
      <input type="file" id="fileInput" accept=".pdf,.txt">
    </div>
    <div class="scan-bar" id="scanBar"><div class="scan-fill" id="scanFill"></div></div>
    <div id="scanStatus" style="text-align:center;font-size:.82rem;color:var(--muted);margin-top:6px;"></div>
  </div>

  <!-- Reading -->
  <div class="card" id="readingCard" style="display:none;">
    <div id="textDisplay"></div>

    <div class="listening-badge" id="listeningBadge">
      <div class="dot"></div> Listening…
    </div>
    <div class="heard" id="heardDisplay"></div>

    <div class="hint-box" id="hintBox">
      <div class="hint-label">💡 Phonics Hint</div>
      <div class="hint-text" id="hintText"></div>
      <div class="hint-steps" id="hintSteps"></div>
    </div>

    <div class="controls" style="margin-top:16px;">
      <button class="btn btn-primary" id="btnListen" disabled>🎤 Start Reading</button>
      <button class="btn btn-danger"  id="btnStop"   style="display:none;">⏹ Stop</button>
      <button class="btn btn-neutral" id="btnReset">🔄 New Book</button>
    </div>

    <span class="debug-toggle" id="debugToggle">🔍 Show debug</span>
    <div id="debugPanel"></div>
  </div>

  <!-- Stats -->
  <div class="card" id="statsCard" style="display:none;">
    <div class="stats">
      <div class="stat"><div class="stat-val" id="statWords">0</div><div class="stat-lbl">Words Read</div></div>
      <div class="stat"><div class="stat-val" id="statHints">0</div><div class="stat-lbl">Hints Used</div></div>
      <div class="stat"><div class="stat-val" id="statStreak">0</div><div class="stat-lbl">Best Streak</div></div>
    </div>
  </div>

</div>

<!-- Celebration -->
<div class="celebration" id="celebration">
  <div class="celeb-inner">
    <div class="celeb-emoji">🎉</div>
    <div class="celeb-title">Amazing Reading!</div>
    <div class="celeb-sub" id="celebStats"></div>
    <button class="btn btn-primary" onclick="resetSession()">📖 Read Another Book</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  PHONICS ENGINE
//  Maps letter patterns → phonetic pronunciation for Web Speech API
//  Uses SSML-friendly English words/sounds that the TTS engine renders correctly
// ─────────────────────────────────────────────────────────────────────────────
const PHONICS = {
  // ── Digraphs & blends (order matters — longer patterns first) ──
  'tch': 'ch',        // catch → ch sound
  'dge': 'j',         // bridge → j sound
  'igh': 'eye',       // night → long i
  'ough': 'oh',       // though → oh (most common)
  'augh': 'aw',       // caught
  'tion': 'shun',     // nation
  'sion': 'zhun',     // vision
  'ck':  'k',         // duck → k
  'ch':  'ch',        // chin (speak as "ch" - TTS handles this)
  'sh':  'sh',        // ship
  'th':  'th',        // this / think (TTS handles "th" correctly)
  'wh':  'wh',        // when → TTS says this right as a word
  'ph':  'f',         // phone → f sound
  'gh':  'g',         // ghost (silent in many words, but TTS ok)
  'qu':  'kw',        // queen → kw
  'ng':  'ng',        // sing
  'nk':  'nk',        // sink
  'kn':  'n',         // knife → silent k
  'wr':  'r',         // write → silent w
  'gn':  'n',         // gnome → silent g
  'mb':  'm',         // lamb → silent b
  'lk':  'lk',
  'st':  'st',
  'str': 'str',
  'spl': 'spl',
  'spr': 'spr',
  'scr': 'scr',
  'shr': 'shr',
  'thr': 'thr',
  'bl':  'bl',
  'br':  'br',
  'cl':  'cl',
  'cr':  'cr',
  'dr':  'dr',
  'fl':  'fl',
  'fr':  'fr',
  'gl':  'gl',
  'gr':  'gr',
  'pl':  'pl',
  'pr':  'pr',
  'sl':  'sl',
  'sm':  'sm',
  'sn':  'sn',
  'sp':  'sp',
  'sw':  'sw',
  'tr':  'tr',
  'tw':  'tw',
  // ── Vowel teams ──
  'ai':  'ay',        // rain
  'ay':  'ay',        // play
  'ea':  'ee',        // read (most common)
  'ee':  'ee',        // tree
  'ie':  'ee',        // field
  'oa':  'oh',        // boat
  'oe':  'oh',        // toe
  'oo':  'oo',        // moon
  'ou':  'ow',        // out
  'ow':  'oh',        // snow (most common)
  'oy':  'oy',        // boy
  'oi':  'oy',        // coin
  'au':  'aw',        // pause
  'aw':  'aw',        // draw
  'ew':  'yoo',       // new
  'ue':  'yoo',       // blue
  'ui':  'oo',        // fruit
};

// For single letters, use phonetic approximations that TTS pronounces right
const SINGLE_PHONICS = {
  'a': 'aah',   'b': 'buh',  'c': 'kuh',  'd': 'duh',
  'e': 'eh',    'f': 'ffff', 'g': 'guh',  'h': 'huh',
  'i': 'ih',    'j': 'juh',  'k': 'kuh',  'l': 'lll',
  'm': 'mmm',   'n': 'nnn',  'o': 'oh',   'p': 'puh',
  'q': 'kwuh',  'r': 'rrr',  's': 'sss',  't': 'tuh',
  'u': 'uh',    'v': 'vvv',  'w': 'wuh',  'x': 'ks',
  'y': 'yuh',   'z': 'zzz',
};

/**
 * buildPhonicsHints(word) → [ hint1_spoken, hint2_spoken, hint3_spoken ]
 * hint1 = opening sound (first digraph or single letter)
 * hint2 = first syllable approximation
 * hint3 = the full word (TTS says it)
 */
function buildPhonicsHints(rawWord) {
  const w = rawWord.toLowerCase().replace(/[^a-z]/g, '');
  if (!w) return [rawWord, rawWord, rawWord];

  // ── Hint 1: opening sound ──
  let sound1 = '';
  let matchLen = 0;
  // Try 3-char patterns first, then 2-char, then 1
  for (const pat of Object.keys(PHONICS).sort((a,b)=>b.length-a.length)) {
    if (w.startsWith(pat)) {
      sound1 = PHONICS[pat];
      matchLen = pat.length;
      break;
    }
  }
  if (!sound1) {
    sound1 = SINGLE_PHONICS[w[0]] || w[0];
    matchLen = 1;
  }

  // ── Hint 2: first syllable ──
  // Approximate: find the first vowel cluster after consonants
  const syllable = getFirstSyllable(w);

  // ── Hint 3: full word ──
  return [sound1, syllable, rawWord];
}

function getFirstSyllable(w) {
  // Vowel set
  const V = 'aeiouy';
  let i = 0;
  // Skip leading consonants
  while (i < w.length && !V.includes(w[i])) i++;
  // Include the vowel cluster
  while (i < w.length && V.includes(w[i])) i++;
  // Include one more consonant if not at end (closed syllable)
  if (i < w.length - 1) i++;
  const syl = w.slice(0, Math.max(i, 2));
  // Now make the syllable more speakable by checking for digraphs
  return syl;
}

// ─────────────────────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────────────────────
let words = [];          // { text: string, clean: string }[]
let wordIndex = 0;       // which word we're waiting for
let hintLevel = 0;       // 0=none, 1=sound, 2=syllable, 3=word
let hintTimer = null;
let recognition = null;
let isListening = false;
let debugVisible = false;
let statsWords = 0, statsHints = 0, statsStreak = 0, currentStreak = 0;
let lastSpeechTime = Date.now();
const HINT_DELAY_MS = 4000; // 4 seconds silence → next hint level

// ─────────────────────────────────────────────────────────────────────────────
//  PDF / TEXT EXTRACTION
// ─────────────────────────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function loadFile(file) {
  setScanStatus('Reading your book…');
  showScanBar(true);

  let fullText = '';

  if (file.name.endsWith('.txt')) {
    fullText = await file.text();
    setScanProgress(100);
  } else {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const total = pdf.numPages;
    for (let p = 1; p <= total; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      fullText += content.items.map(i => i.str).join(' ') + ' ';
      setScanProgress(Math.round((p / total) * 100));
    }
  }

  // Tokenise into words, preserving original text for display
  const rawTokens = fullText.trim().split(/\s+/).filter(t => t.length > 0);
  words = rawTokens.map(t => ({
    text: t,
    clean: t.toLowerCase().replace(/[^a-z']/g, '')
  })).filter(w => w.clean.length > 0);

  if (words.length === 0) {
    setScanStatus('❌ Could not read text from this PDF. Try a text-based PDF.');
    showScanBar(false);
    return;
  }

  setScanStatus(`✅ Loaded ${words.length} words. Ready!`);
  showScanBar(false);
  wordIndex = 0; hintLevel = 0;
  renderText();
  document.getElementById('uploadCard').style.display = 'none';
  document.getElementById('readingCard').style.display = 'block';
  document.getElementById('statsCard').style.display = 'block';
  document.getElementById('btnListen').disabled = false;
  updateStats();
}

function setScanStatus(msg) { document.getElementById('scanStatus').textContent = msg; }
function showScanBar(v) { document.getElementById('scanBar').style.display = v ? 'block' : 'none'; }
function setScanProgress(pct) { document.getElementById('scanFill').style.width = pct + '%'; }

// ─────────────────────────────────────────────────────────────────────────────
//  TEXT RENDERING
// ─────────────────────────────────────────────────────────────────────────────
function renderText() {
  const el = document.getElementById('textDisplay');
  const start = Math.max(0, wordIndex - 8);
  const end   = Math.min(words.length, wordIndex + 30);

  el.innerHTML = '';

  if (start > 0) {
    const dots = document.createElement('span');
    dots.textContent = '… ';
    dots.style.color = '#aaa';
    el.appendChild(dots);
  }

  for (let i = start; i < end; i++) {
    const span = document.createElement('span');
    span.className = 'word' + (i < wordIndex ? ' done' : i === wordIndex ? ' current' : '');
    span.textContent = words[i].text;
    span.dataset.idx = i;
    el.appendChild(span);
    el.appendChild(document.createTextNode(' '));
  }

  if (end < words.length) {
    const dots = document.createElement('span');
    dots.textContent = ' …';
    dots.style.color = '#aaa';
    el.appendChild(dots);
  }

  // Scroll current word into view
  const cur = el.querySelector('.current');
  if (cur) cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ─────────────────────────────────────────────────────────────────────────────
//  WORD MATCHING
//  Key fix: we match against EXACTLY wordIndex — no skipping ahead.
//  Consecutive-duplicate words each get their own slot.
// ─────────────────────────────────────────────────────────────────────────────

/** Normalise for comparison */
function norm(s) { return s.toLowerCase().replace(/[^a-z]/g, ''); }

/** Levenshtein distance */
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_,i) => Array.from({length: n+1}, (_,j) => i||j));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

/** Returns true if spoken word matches the target */
function isMatch(spoken, target) {
  if (!spoken || !target) return false;
  const s = norm(spoken), t = norm(target);
  if (!s || !t) return false;
  if (s === t) return true;
  // Allow 1 edit for short words, 2 for longer
  const maxDist = t.length <= 4 ? 1 : 2;
  if (lev(s, t) <= maxDist) return true;
  // Allow if one starts-with the other (truncation common in kids' speech)
  if (t.startsWith(s) && s.length >= Math.max(3, t.length - 2)) return true;
  if (s.startsWith(t) && t.length >= 3) return true;
  return false;
}

/**
 * Process a recognition result transcript.
 * We scan the spoken tokens left-to-right and try to advance wordIndex.
 * Each token can advance index by AT MOST 1 — no skipping duplicates.
 */
function processTranscript(transcript) {
  const tokens = transcript.trim().toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).filter(Boolean);
  logDebug(`heard: "${tokens.join(' ')}"`, '');

  let advanced = false;

  for (const tok of tokens) {
    if (wordIndex >= words.length) break;
    const target = words[wordIndex].clean;
    if (isMatch(tok, target)) {
      logDebug(`✓ "${tok}" → "${target}"`, 'ok');
      advanceWord();
      advanced = true;
    } else {
      logDebug(`✗ "${tok}" ≠ "${target}"`, 'miss');
    }
  }

  if (advanced) {
    lastSpeechTime = Date.now();
    resetHintTimer();
    hideHint();
  }

  document.getElementById('heardDisplay').textContent = `Heard: "${transcript.trim()}"`;
}

function advanceWord() {
  wordIndex++;
  statsWords++;
  currentStreak++;
  if (currentStreak > statsStreak) statsStreak = currentStreak;
  updateStats();
  renderText();
  if (wordIndex >= words.length) {
    stopListening();
    showCelebration();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  HINT SYSTEM
// ─────────────────────────────────────────────────────────────────────────────
function startHintTimer() {
  clearTimeout(hintTimer);
  hintTimer = setTimeout(showNextHint, HINT_DELAY_MS);
}

function resetHintTimer() {
  clearTimeout(hintTimer);
  if (isListening) startHintTimer();
}

function showNextHint() {
  if (wordIndex >= words.length) return;
  hintLevel = Math.min(hintLevel + 1, 3);
  statsHints++;
  currentStreak = 0;
  updateStats();
  renderHint();
  // Schedule next hint level after another delay
  if (hintLevel < 3) {
    hintTimer = setTimeout(showNextHint, HINT_DELAY_MS);
  }
}

function renderHint() {
  if (hintLevel === 0 || wordIndex >= words.length) { hideHint(); return; }
  const word = words[wordIndex].text;
  const [h1, h2, h3] = buildPhonicsHints(word);
  const hints = [h1, h2, h3];
  const labels = ['🔊 First Sound', '🔤 First Part', '💬 Whole Word'];

  document.getElementById('hintBox').classList.add('show');

  // Mark current word as hinting
  const curEl = document.querySelector('.word.current');
  if (curEl) curEl.classList.add('hinting');

  const stepsEl = document.getElementById('hintSteps');
  stepsEl.innerHTML = '';
  for (let i = 0; i < hintLevel; i++) {
    const btn = document.createElement('button');
    btn.className = 'hint-step' + (i === hintLevel - 1 ? ' active' : '');
    btn.textContent = labels[i];
    const hint = hints[i];
    btn.onclick = () => speakHint(hint, i + 1);
    stepsEl.appendChild(btn);
  }

  // Display text for current level
  document.getElementById('hintText').textContent =
    hintLevel === 1 ? `"${h1}" sound` :
    hintLevel === 2 ? `"${h2}…"` :
    `"${h3}"`;

  // Auto-speak
  speakHint(hints[hintLevel - 1], hintLevel);
  logDebug(`hint ${hintLevel} for "${word}": ${hints[hintLevel-1]}`, 'hint');
}

function speakHint(text, level) {
  const utt = new SpeechSynthesisUtterance(text);
  // Slower speech for hints helps kids process
  utt.rate  = level === 1 ? 0.6 : level === 2 ? 0.75 : 0.85;
  utt.pitch = 1.1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

function speakText(text) {
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.9; utt.pitch = 1.1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

function hideHint() {
  hintLevel = 0;
  document.getElementById('hintBox').classList.remove('show');
  document.querySelectorAll('.word.hinting').forEach(el => el.classList.remove('hinting'));
}

// ─────────────────────────────────────────────────────────────────────────────
//  SPEECH RECOGNITION
// ─────────────────────────────────────────────────────────────────────────────
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Speech recognition not supported. Use Chrome on desktop.'); return; }

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 3;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('listeningBadge').classList.add('show');
    document.getElementById('btnListen').style.display = 'none';
    document.getElementById('btnStop').style.display = 'flex';
    startHintTimer();
    logDebug('recognition started', 'ok');
  };

  recognition.onresult = (e) => {
    // Only process final results to avoid double-counting interim transcripts
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        // Try all alternatives
        for (let a = 0; a < e.results[i].length; a++) {
          processTranscript(e.results[i][a].transcript);
        }
      }
    }
  };

  recognition.onerror = (e) => {
    logDebug('error: ' + e.error, 'miss');
    if (e.error === 'not-allowed') {
      alert('Microphone access denied. Please allow microphone access and reload.');
    }
  };

  recognition.onend = () => {
    // Auto-restart unless we stopped intentionally
    if (isListening) {
      try { recognition.start(); } catch(_) {}
    }
  };

  try { recognition.start(); } catch(e) { logDebug('start failed: ' + e.message, 'miss'); }
}

function stopListening() {
  isListening = false;
  clearTimeout(hintTimer);
  if (recognition) { try { recognition.stop(); } catch(_) {} recognition = null; }
  document.getElementById('listeningBadge').classList.remove('show');
  document.getElementById('btnListen').style.display = 'flex';
  document.getElementById('btnStop').style.display = 'none';
}

// ─────────────────────────────────────────────────────────────────────────────
//  STATS & CELEBRATION
// ─────────────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statWords').textContent   = statsWords;
  document.getElementById('statHints').textContent   = statsHints;
  document.getElementById('statStreak').textContent  = statsStreak;
}

function showCelebration() {
  document.getElementById('celebStats').textContent =
    `${statsWords} words read · ${statsHints} hints used · Best streak: ${statsStreak}`;
  document.getElementById('celebration').classList.add('show');
  speakText('Wow! You finished the whole book! Amazing reading!');
}

function resetSession() {
  document.getElementById('celebration').classList.remove('show');
  wordIndex = 0; hintLevel = 0;
  statsWords = 0; statsHints = 0; statsStreak = 0; currentStreak = 0;
  clearTimeout(hintTimer);
  updateStats(); hideHint();
  document.getElementById('heardDisplay').textContent = '';
  if (words.length > 0) renderText();
}

// ─────────────────────────────────────────────────────────────────────────────
//  DEBUG
// ─────────────────────────────────────────────────────────────────────────────
function logDebug(msg, type) {
  if (!debugVisible) return;
  const panel = document.getElementById('debugPanel');
  const p = document.createElement('p');
  p.className = type;
  p.textContent = msg;
  panel.appendChild(p);
  panel.scrollTop = panel.scrollHeight;
  while (panel.children.length > 40) panel.removeChild(panel.firstChild);
}

// ─────────────────────────────────────────────────────────────────────────────
//  EVENT WIRING
// ─────────────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {

  // HTTPS check
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    document.getElementById('httpsWarn').classList.add('show');
  }

  // Upload zone
  const zone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');

  zone.addEventListener('click', () => fileInput.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) loadFile(f);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  // Buttons
  document.getElementById('btnListen').addEventListener('click', startListening);
  document.getElementById('btnStop').addEventListener('click', stopListening);
  document.getElementById('btnReset').addEventListener('click', () => {
    stopListening();
    words = []; wordIndex = 0;
    statsWords = 0; statsHints = 0; statsStreak = 0; currentStreak = 0;
    document.getElementById('readingCard').style.display = 'none';
    document.getElementById('statsCard').style.display = 'none';
    document.getElementById('uploadCard').style.display = 'block';
    document.getElementById('scanStatus').textContent = '';
    document.getElementById('heardDisplay').textContent = '';
    hideHint();
  });

  // Debug toggle
  document.getElementById('debugToggle').addEventListener('click', () => {
    debugVisible = !debugVisible;
    document.getElementById('debugPanel').classList.toggle('show', debugVisible);
    document.getElementById('debugToggle').textContent = debugVisible ? '🔍 Hide debug' : '🔍 Show debug';
  });
});
</script>
</body>
